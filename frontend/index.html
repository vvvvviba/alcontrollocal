<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Control - 本地化部署</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --header-bg: #0f172a;
            --chat-bg: #0f172a;
            --input-bg: #0f172a;
            --bubble-ai: #1e293b; /* Slate 800 */
            --bubble-user: #3b82f6; /* Blue 500 */
            --text-primary: #e2e8f0; /* Slate 200 */
            --text-secondary: #94a3b8; /* Slate 400 */
            --border-color: #334155; /* Slate 700 */
            --input-field-bg: #1e293b; /* Slate 800 */
            --scroll-track: #0f172a;
            --scroll-thumb: #334155;
            --scroll-thumb-hover: #475569;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc; /* Slate 50 */
            --header-bg: #ffffff;
            --chat-bg: #f8fafc;
            --input-bg: #ffffff;
            --bubble-ai: #ffffff;
            --bubble-user: #3b82f6;
            --text-primary: #1e293b; /* Slate 800 */
            --text-secondary: #64748b; /* Slate 500 */
            --border-color: #e2e8f0; /* Slate 200 */
            --input-field-bg: #f1f5f9; /* Slate 100 */
            --scroll-track: #f1f5f9;
            --scroll-thumb: #cbd5e1;
            --scroll-thumb-hover: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scroll-track);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 5px;
            border: 2px solid var(--scroll-track); /* Creates padding effect */
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scroll-thumb-hover);
        }

        .chat-container-width {
            max-width: 56rem; /* 4xl */
            margin: 0 auto;
            width: 100%;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            /* Handle text overflow */
            overflow-wrap: break-word;
            word-wrap: break-word;
            min-width: 0; /* Important for flex items */
        }
        
        .chat-bubble pre {
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 0.5rem 0;
            overflow-x: auto; /* Enable horizontal scroll for code blocks */
            white-space: pre; /* Preserve formatting but allow scroll */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-bubble code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.875rem;
        }
        
        /* Inline code style */
        .chat-bubble :not(pre) > code {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
        }

        /* Light mode adjustments for code blocks */
        [data-theme="light"] .chat-bubble pre {
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
        }
        [data-theme="light"] .chat-bubble :not(pre) > code {
            background-color: #e2e8f0;
        }
        /* Markdown Table Styles */
        .chat-bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.875rem;
        }
        .chat-bubble th, .chat-bubble td {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            text-align: left;
        }
        .chat-bubble th {
            background-color: rgba(0, 0, 0, 0.2);
            font-weight: 600;
        }
        [data-theme="light"] .chat-bubble th {
            background-color: #f1f5f9; /* Slate 100 */
        }
        
        .header-styled {
            background-color: var(--header-bg);
            border-bottom-color: var(--border-color);
        }
        .footer-styled {
            background-color: var(--input-bg);
            border-top-color: var(--border-color);
        }
        .input-styled {
            background-color: var(--input-field-bg);
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        .input-styled::placeholder {
            color: var(--text-secondary);
        }
        
        .user-bubble {
            background-color: var(--bubble-user);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }
        .ai-bubble {
            background-color: var(--bubble-ai);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            border: 1px solid var(--border-color);
            /* Ensure bubble doesn't grow beyond container */
            width: fit-content;
        }
        
        /* Light mode adjustments for code blocks if needed */
        /* Removed duplicate styles that are now in .chat-bubble pre/code */
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #94a3b8;
            border-radius: 50%;
            animation: typing 1s infinite ease-in-out;
            margin-right: 4px;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        /* Clickable link styles */
        .chat-bubble a {
            color: #60a5fa; /* blue-400 */
            text-decoration: underline;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chat-bubble a:hover {
            color: #93c5fd; /* blue-300 */
        }
        
        /* Specific style for cmd links (if needed different) */
        .chat-bubble a[href^="cmd:"] {
            text-decoration: none;
            border-bottom: 1px dashed currentColor;
        }
        .chat-bubble a[href^="cmd:"]:hover {
            border-bottom-style: solid;
        }

        /* Light mode link adjustment */
        [data-theme="light"] .chat-bubble a {
            color: #2563eb; /* blue-600 */
        }
        [data-theme="light"] .chat-bubble a:hover {
            color: #1d4ed8; /* blue-700 */
        }
        .mode-btn-active {
            background-color: #2563eb; /* blue-600 */
            color: #ffffff !important;
        }
        .mode-btn-inactive {
            color: var(--text-secondary);
        }
        .mode-btn-inactive:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.05);
        }
        [data-theme="light"] .mode-btn-inactive:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        /* Tooltip styling */
        .tooltip-container {
            position: relative;
        }
        .tooltip-container:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            top: 100%; /* Position below the button */
            bottom: auto; /* Reset bottom */
            left: 50%;
            transform: translateX(-50%);
            margin-top: 0.5rem; /* Add some spacing */
            padding: 0.5rem;
            background-color: var(--bubble-ai);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 0.75rem;
            white-space: pre-wrap; /* Allow line breaks */
            text-align: left; /* Align text to left for list */
            z-index: 50; /* Higher z-index to ensure visibility */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            pointer-events: none;
            width: max-content; /* Auto width */
            max-width: 300px; /* Max width */
        }
        /* Settings Modal */
        #settings-modal {
            background-color: rgba(0, 0, 0, 0.5);
        }
        .modal-content {
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .settings-sidebar-bg {
            background-color: var(--input-field-bg);
            border-right-color: var(--border-color);
        }
        .settings-tab-active {
            background-color: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        .settings-tab-inactive {
            color: var(--text-secondary);
        }
        .settings-tab-inactive:hover {
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--text-primary);
        }
        /* Light mode overrides for settings specific elements */
        [data-theme="light"] .settings-tab-active {
            background-color: #dbeafe; /* blue-100 */
            color: #2563eb; /* blue-600 */
        }
        .share-icon-bg-inactive {
            background-color: var(--input-field-bg);
        }
        .share-icon-text-inactive {
            color: var(--text-secondary);
        }
        .share-link-text {
            color: #ffffff;
        }
        [data-theme="light"] .share-link-text {
            color: #1e293b;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 border-b flex items-center justify-between header-styled">
        <div class="flex items-center space-x-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">AI Control Local</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- Mode Switcher -->
            <div class="flex items-center rounded-lg p-1 border border-slate-700" style="background-color: var(--input-field-bg); border-color: var(--border-color);">
                <button id="mode-smart" class="px-3 py-1 rounded text-sm font-medium transition-colors mode-btn-active tooltip-container" data-tooltip="智能模式：使用AI理解您的自然语言指令">
                    智能模式
                </button>
                <button id="mode-regex" class="px-3 py-1 rounded text-sm font-medium transition-colors mode-btn-inactive tooltip-container" data-tooltip="非智能模式快捷指令：&#10;1. show <路径> (查看目录)&#10;2. read <路径> (读取文件)&#10;3. open <路径> (打开文件)&#10;4. copy <源> <目标> (复制)&#10;5. start share (开始共享)&#10;6. stop share (停止共享)">
                    非智能模式
                </button>
            </div>

            <!-- Share Button -->
            <button id="share-btn" class="p-2 rounded-full hover:bg-slate-700/20 text-slate-400 hover:text-blue-500 transition-colors" title="局域网共享">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                </svg>
            </button>

            <!-- Settings Button -->
            <button id="settings-btn" class="p-2 rounded-full hover:bg-slate-700/20 text-slate-400 hover:text-blue-500 transition-colors" title="设置">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>

            <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-700/20 text-slate-400 hover:text-blue-500 transition-colors" title="切换主题">
                <!-- Sun Icon -->
                <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <!-- Moon Icon -->
                <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
            <div class="text-sm text-slate-400">运行中</div>
        </div>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 flex flex-col items-center space-y-4">
        <div id="messages-wrapper" class="chat-container-width flex flex-col space-y-4 w-full">
            <!-- Welcome Message -->
            <div class="ai-bubble chat-bubble">
                <p>你好！我是你的本地AI助手。我可以帮你管理文件、查看目录或开启局域网共享。</p>
                <p class="mt-2 text-sm text-slate-400">你可以试试说：<br>"把 D 盘 Downloads 里的图片都复制到 Photos 文件夹"</p>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="p-4 border-t footer-styled">
        <div class="max-w-4xl mx-auto relative flex items-center gap-3">
            <!-- Clear History Button (Moved here) -->
            <button id="clear-btn" class="p-2 rounded-full hover:bg-slate-700/20 text-slate-400 hover:text-red-500 transition-colors" title="清空历史记录">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>

            <div class="relative flex-1">
                <input type="text" id="user-input" 
                    class="w-full rounded-full py-3 px-6 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500 border input-styled"
                    placeholder="输入指令..." autofocus>
                <button id="send-btn" class="absolute right-2 top-1/2 transform -translate-y-1/2 p-2 bg-blue-600 rounded-full hover:bg-blue-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="text-center mt-2 text-xs text-slate-500">
            AI可能会产生错误。请检查重要信息。
        </div>
    </footer>

    <!-- Share Modal -->
    <div id="share-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="modal-content rounded-lg w-[600px] shadow-xl overflow-hidden flex flex-col">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center header-styled">
                <h2 class="text-lg font-bold">局域网文件共享</h2>
                <button id="share-close-btn" class="text-slate-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
            
            <div class="p-6 flex-1 overflow-y-auto">
                <div id="share-status-content" class="text-center space-y-6">
                    <!-- Status Icon -->
                    <div class="flex justify-center">
                        <div id="share-status-icon" class="w-20 h-20 share-icon-bg-inactive rounded-full flex items-center justify-center">
                            <svg id="share-status-svg" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 share-icon-text-inactive" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                            </svg>
                        </div>
                    </div>
                    
                    <h3 id="share-status-title" class="text-xl font-medium">共享服务未开启</h3>
                    <p id="share-status-desc" class="text-slate-400 text-sm">开启后，同一 Wi-Fi 下的设备可访问此电脑共享文件。</p>
                    
                    <div id="share-info-panel" class="hidden bg-blue-500/10 border border-blue-500/30 rounded-lg p-4 text-left">
                        <div class="mb-2 text-sm text-blue-400 font-semibold">局域网访问地址：</div>
                        <div class="flex items-center gap-2 mb-4">
                            <a id="share-url-link" href="#" target="_blank" class="text-xl font-mono share-link-text hover:text-blue-400 transition-colors">http://192.168.x.x:8081</a>
                            <button id="copy-url-btn" class="p-1 hover:bg-slate-500/20 rounded text-slate-400 hover:text-blue-500" title="复制链接">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                        <div class="text-xs text-slate-500">
                            共享文件夹路径：<span class="font-mono bg-black/10 px-1 rounded">D:/aicontrol/shared</span>
                        </div>
                    </div>

                    <div class="flex justify-center gap-4 pt-4">
                        <button id="toggle-share-btn" class="px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors shadow-lg shadow-blue-500/30 flex items-center gap-2">
                            <span>开启共享</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="modal-content rounded-lg w-[800px] h-[500px] shadow-xl overflow-hidden flex flex-col">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center header-styled">
                <h2 class="text-lg font-bold">设置</h2>
                <button id="settings-close-btn" class="text-slate-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
            
            <div class="flex flex-1 overflow-hidden">
                <!-- Sidebar -->
                <div class="w-48 border-r border-gray-700 p-2 space-y-1 settings-sidebar-bg">
                    <button class="settings-tab-btn w-full text-left px-3 py-2 rounded text-sm font-medium transition-colors settings-tab-active" data-tab="llm">
                        模型和API
                    </button>
                    <button class="settings-tab-btn w-full text-left px-3 py-2 rounded text-sm font-medium transition-colors settings-tab-inactive" data-tab="profile">
                        个人界面
                    </button>
                </div>

                <!-- Content Area -->
                <div class="flex-1 overflow-y-auto p-6 relative">
                    <!-- Tab: LLM Settings -->
                    <div id="tab-content-llm" class="settings-tab-content space-y-6">
                        <h3 class="text-lg font-medium mb-4 pb-2 border-b border-gray-700">模型和API配置</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1 text-slate-400">API Key</label>
                                <div class="relative">
                                    <input type="password" id="config-api-key" class="w-full rounded p-2 pr-10 border input-styled focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="sk-...">
                                    <button id="toggle-api-key" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-white" title="显示/隐藏">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium mb-1 text-slate-400">Base URL</label>
                                <input type="text" id="config-base-url" class="w-full rounded p-2 border input-styled focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://api.openai.com/v1">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium mb-1 text-slate-400">Model Name</label>
                                <select id="config-model" class="w-full rounded p-2 border input-styled focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-no-repeat bg-right text-current">
                                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                                    <option value="gpt-4">GPT-4</option>
                                    <option value="gpt-4o">GPT-4o</option>
                                    <option value="gpt-4o-mini">GPT-4o Mini</option>
                                    <option value="MiniMax-M2.5">MiniMax-M2.5 (默认)</option>
                                    <option value="abab5.5-chat">MiniMax abab5.5</option>
                                    <option value="abab6-chat">MiniMax abab6</option>
                                    <option value="custom">自定义...</option>
                                </select>
                                <input type="text" id="config-model-custom" class="w-full rounded p-2 border input-styled focus:outline-none focus:ring-2 focus:ring-blue-500 mt-2 hidden" placeholder="输入模型名称...">
                            </div>
                        </div>
                    </div>

                    <!-- Tab: Profile Settings -->
                    <div id="tab-content-profile" class="settings-tab-content hidden space-y-6">
                        <h3 class="text-lg font-medium mb-4 pb-2 border-b border-gray-700">个人界面设置</h3>
                        <div class="flex items-center justify-center h-40 text-slate-500 border-2 border-dashed border-gray-700 rounded-lg">
                            <div class="text-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto mb-2 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                                <p>更多个性化选项即将推出...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-4 border-t border-gray-700 flex justify-end gap-3 header-styled">
                <button id="settings-cancel" class="px-4 py-2 rounded text-slate-400 hover:text-white transition-colors">取消</button>
                <button id="settings-save" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors shadow-lg shadow-blue-500/30">保存更改</button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messagesWrapper = document.getElementById('messages-wrapper');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        
        // Mode State
        let currentMode = 'smart';
        const modeSmartBtn = document.getElementById('mode-smart');
        const modeRegexBtn = document.getElementById('mode-regex');

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'smart') {
                modeSmartBtn.classList.add('mode-btn-active');
                modeSmartBtn.classList.remove('mode-btn-inactive');
                modeRegexBtn.classList.add('mode-btn-inactive');
                modeRegexBtn.classList.remove('mode-btn-active');
                userInput.placeholder = "输入自然语言指令...";
            } else {
                modeRegexBtn.classList.add('mode-btn-active');
                modeRegexBtn.classList.remove('mode-btn-inactive');
                modeSmartBtn.classList.add('mode-btn-inactive');
                modeSmartBtn.classList.remove('mode-btn-active');
                userInput.placeholder = "输入快捷指令 (如: show D:/aicontrol) 或 中文指令";
            }
        }

        modeSmartBtn.addEventListener('click', () => setMode('smart'));
        modeRegexBtn.addEventListener('click', () => setMode('regex'));

        async function openPath(path) {
            try {
                await axios.post('/api/open', { path });
            } catch (e) {
                console.error(e);
                alert("Failed to open path: " + (e.response?.data?.detail || e.message));
            }
        }

        // Intercept link clicks
        document.addEventListener('click', (e) => {
            // Check if clicked element or its parent is an A tag
            const link = e.target.closest('a');
            if (link) {
                const href = link.getAttribute('href');
                if (href && href.startsWith('cmd:')) {
                    e.preventDefault();
                    // Format: cmd:action:path
                    // Note: path is URL encoded
                    const firstColon = href.indexOf(':');
                    const secondColon = href.indexOf(':', firstColon + 1);
                    
                    if (secondColon !== -1) {
                        const action = href.substring(firstColon + 1, secondColon);
                        // Decode the path
                        let path = decodeURIComponent(href.substring(secondColon + 1));
                        
                        let message = "";
                        if (currentMode === 'smart') {
                            if (action === 'list') {
                                message = `查看目录: ${path}`;
                            } else if (action === 'read') {
                                message = `读取文件: ${path}`;
                            } else if (action === 'open') {
                                message = `打开文件: ${path}`;
                            }
                        } else {
                            // Regex/Shortcut mode
                            if (action === 'list') {
                                message = `show ${path}`;
                            } else if (action === 'read') {
                                message = `read ${path}`;
                            } else if (action === 'open') {
                                message = `open ${path}`;
                            }
                        }
                        
                        if (message) {
                            // userInput.value = message;
                            // sendMessage();
                            // Better UX: Don't fill input, just send hidden message or display as user message
                            // But keeping it simple:
                            addMessage(message, true);
                            addTypingIndicator();
                            
                            axios.post('/api/chat', { 
                                message: message,
                                mode: currentMode
                            })
                                .then(response => {
                                    removeTypingIndicator();
                                    addMessage(response.data.response, false, response.data.action_link);
                                })
                                .catch(error => {
                                    removeTypingIndicator();
                                    addMessage(`Error: ${error.message || 'Something went wrong'}`, false);
                                });
                        }
                    }
                }
            }
        });

        function addMessage(text, isUser, actionLink = null, save = true) {
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${isUser ? 'user-bubble' : 'ai-bubble'}`;
            
            if (isUser) {
                // Add mode tag
                const modeTag = document.createElement('div');
                modeTag.className = "text-[10px] opacity-60 mb-1 font-mono uppercase tracking-wider text-right";
                modeTag.textContent = currentMode === 'smart' ? '✨ Smart Mode' : '⚡ Regex Mode';
                bubble.appendChild(modeTag);
                
                const content = document.createElement('div');
                content.textContent = text;
                bubble.appendChild(content);
            } else {
                // AI Response
                bubble.innerHTML = marked.parse(text);
                if (actionLink) {
                    const linkDiv = document.createElement('div');
                    linkDiv.className = "mt-2 pt-2 border-t border-slate-600";
                    
                    const btn = document.createElement('button');
                    btn.className = "text-blue-400 hover:text-blue-300 flex items-center gap-1 text-sm font-medium transition-colors cursor-pointer";
                    btn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                        </svg>
                        点击打开文件夹确认
                    `;
                    btn.onclick = () => openPath(actionLink);
                    
                    linkDiv.appendChild(btn);
                    bubble.appendChild(linkDiv);
                }
            }

            messagesWrapper.appendChild(bubble);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            if (save) {
                // We need to pass the mode correctly for saving.
                // However, currentMode might change if we are in loadChatHistory loop.
                // But addMessage is called with save=false in loadChatHistory.
                // So when save=true, it's a live message, and currentMode is correct.
                saveChatHistory(text, isUser, actionLink);
            }
        }

        // Persistence Logic
        function saveChatHistory(text, isUser, actionLink) {
            // Fix: Store the current mode (or mode from args if provided) correctly
            // The addMessage function relies on global currentMode for rendering the user bubble tag.
            // When saving, we should save the mode used for that message.
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            
            // Only save if it's a new message
            history.push({ 
                text: text, 
                isUser: isUser, 
                actionLink: actionLink, 
                mode: currentMode, // Save the mode active when message was sent
                timestamp: Date.now() 
            });
            
            if (history.length > 50) history.shift();
            localStorage.setItem('chat_history', JSON.stringify(history));
        }

        function loadChatHistory() {
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            if (history.length > 0) {
                messagesWrapper.innerHTML = ''; // Clear welcome message
                
                // We need to be careful not to trigger save again when loading
                history.forEach(msg => {
                    // Temporarily set global mode so the bubble renders with correct tag
                    const savedMode = msg.mode || 'smart'; // Default to smart for old messages
                    const originalMode = currentMode;
                    currentMode = savedMode;
                    
                    addMessage(msg.text, msg.isUser, msg.actionLink, false); // false = don't save
                    
                    currentMode = originalMode; // Restore actual current mode
                });
            }
        }

        // Initialize history on load
        window.addEventListener('DOMContentLoaded', () => {
            loadChatHistory();
            
            // If history is empty, show welcome message (it's already in HTML, but we might have cleared it if history loaded)
            // Actually, the HTML static content is the welcome message. 
            // loadChatHistory only clears it if history exists.
        });

        // Clear History Logic
        clearBtn.addEventListener('click', () => {
            if (confirm("确定要清空所有历史聊天记录吗？此操作不可恢复。")) {
                localStorage.removeItem('chat_history');
                messagesWrapper.innerHTML = `
                    <div class="ai-bubble chat-bubble">
                        <p>历史记录已清空。</p>
                        <p class="mt-2 text-sm text-slate-400">你好！我是你的本地AI助手。我可以帮你管理文件、查看目录或开启局域网共享。</p>
                    </div>
                `;
            }
        });

        function addTypingIndicator() {
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ai-bubble typing-indicator';
            bubble.id = 'typing-indicator';
            bubble.innerHTML = '<span></span><span></span><span></span>';
            messagesWrapper.appendChild(bubble);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return bubble;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Clear input
            userInput.value = '';
            
            // Add user message
            addMessage(message, true);

            // Add typing indicator
            addTypingIndicator();

            try {
                // Call backend
                const response = await axios.post('/api/chat', { 
                    message: message,
                    mode: currentMode
                });
                
                removeTypingIndicator();
                addMessage(response.data.response, false, response.data.action_link);
            } catch (error) {
                removeTypingIndicator();
                addMessage(`Error: ${error.message || 'Something went wrong'}`, false);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const htmlElement = document.documentElement;

        // Check local storage or system preference
        const savedTheme = localStorage.getItem('theme');
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const initialTheme = savedTheme || systemTheme;

        setTheme(initialTheme);

        function setTheme(theme) {
            htmlElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            
            if (theme === 'dark') {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        });

        // Share Logic
        const shareBtn = document.getElementById('share-btn');
        const shareModal = document.getElementById('share-modal');
        const shareCloseBtn = document.getElementById('share-close-btn');
        const toggleShareBtn = document.getElementById('toggle-share-btn');
        const shareStatusIcon = document.getElementById('share-status-icon');
        const shareStatusTitle = document.getElementById('share-status-title');
        const shareStatusDesc = document.getElementById('share-status-desc');
        const shareInfoPanel = document.getElementById('share-info-panel');
        const shareUrlLink = document.getElementById('share-url-link');
        const copyUrlBtn = document.getElementById('copy-url-btn');
        
        let isSharing = false;

        function updateShareUI(active, url = "") {
            isSharing = active;
            if (active) {
                // Active State
                shareStatusIcon.classList.remove('share-icon-bg-inactive');
                shareStatusIcon.classList.add('bg-green-600', 'text-white');
                shareStatusIcon.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.829a5 5 0 010-7.07m7.072 0a5 5 0 010 7.07M13 12a1 1 0 11-2 0 1 1 0 012 0z" />
                    </svg>
                `;
                shareStatusTitle.textContent = "共享服务运行中";
                shareStatusTitle.className = "text-xl font-medium text-green-500";
                shareStatusDesc.textContent = "服务正常，其他设备可访问以下地址进行文件传输。";
                
                shareInfoPanel.classList.remove('hidden');
                shareUrlLink.textContent = url;
                shareUrlLink.href = url;
                
                toggleShareBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
                    </svg>
                    <span>停止共享</span>
                `;
                toggleShareBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'shadow-blue-500/30');
                toggleShareBtn.classList.add('bg-red-600', 'hover:bg-red-700', 'shadow-red-500/30');
            } else {
                // Inactive State
                shareStatusIcon.classList.remove('bg-green-600', 'text-white');
                shareStatusIcon.classList.add('share-icon-bg-inactive');
                shareStatusIcon.innerHTML = `
                    <svg id="share-status-svg" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 share-icon-text-inactive" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                    </svg>
                `;
                shareStatusTitle.textContent = "共享服务未开启";
                shareStatusTitle.className = "text-xl font-medium";
                shareStatusDesc.textContent = "开启后，同一 Wi-Fi 下的设备可访问此电脑共享文件。";
                
                shareInfoPanel.classList.add('hidden');
                
                toggleShareBtn.innerHTML = `<span>开启共享</span>`;
                toggleShareBtn.classList.add('bg-blue-600', 'hover:bg-blue-700', 'shadow-blue-500/30');
                toggleShareBtn.classList.remove('bg-red-600', 'hover:bg-red-700', 'shadow-red-500/30');
            }
        }

        // Open Share Modal
        shareBtn.addEventListener('click', async () => {
            shareModal.classList.remove('hidden');
            // Check status via backend command
            try {
                const response = await axios.post('/api/chat', { 
                    message: "check share", 
                    mode: "regex" 
                });
                
                // Result format: "running|http://..." or "stopped"
                const result = response.data.response;
                
                if (result.startsWith("running|")) {
                    const url = result.split("|")[1];
                    updateShareUI(true, url);
                } else {
                    updateShareUI(false);
                }
            } catch(e) {
                console.error(e);
                updateShareUI(false);
            }
        });

        function closeShareModal() {
            shareModal.classList.add('hidden');
        }
        shareCloseBtn.addEventListener('click', closeShareModal);
        shareModal.addEventListener('click', (e) => {
            if (e.target === shareModal) closeShareModal();
        });

        // Toggle Share Action
        toggleShareBtn.addEventListener('click', async () => {
            const command = isSharing ? "stop share" : "start share";
            
            // Add loading state
            toggleShareBtn.disabled = true;
            toggleShareBtn.style.opacity = "0.7";
            
            try {
                const response = await axios.post('/api/chat', { 
                    message: command, 
                    mode: "regex" 
                });
                
                const result = response.data.response;
                
                if (command === "start share") {
                    // Check if it actually started
                    if (result.includes("http")) {
                        const match = result.match(/http:\/\/[0-9.:]+/);
                        const url = match ? match[0] : "";
                        updateShareUI(true, url);
                        addMessage(result, false); 
                    } else {
                        alert("启动失败: " + result);
                    }
                } else if (command === "stop share") {
                    updateShareUI(false);
                    addMessage("共享服务已停止。", false);
                }
            } catch (e) {
                alert("请求失败: " + e.message);
            } finally {
                toggleShareBtn.disabled = false;
                toggleShareBtn.style.opacity = "1";
            }
        });

        // Copy URL
        copyUrlBtn.addEventListener('click', () => {
            const url = shareUrlLink.textContent;
            navigator.clipboard.writeText(url).then(() => {
                const originalHtml = copyUrlBtn.innerHTML;
                copyUrlBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>`;
                setTimeout(() => {
                    copyUrlBtn.innerHTML = originalHtml;
                }, 2000);
            });
        });

        // Settings Logic
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const settingsCancel = document.getElementById('settings-cancel');
        const settingsSave = document.getElementById('settings-save');
        const settingsCloseBtn = document.getElementById('settings-close-btn');
        const configApiKey = document.getElementById('config-api-key');
        const toggleApiKeyBtn = document.getElementById('toggle-api-key');
        const configBaseUrl = document.getElementById('config-base-url');
        const configModelSelect = document.getElementById('config-model');
        const configModelCustom = document.getElementById('config-model-custom');

        // Tab Logic
        const tabBtns = document.querySelectorAll('.settings-tab-btn');
        const tabContents = document.querySelectorAll('.settings-tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetTab = btn.getAttribute('data-tab');
                
                // Update buttons
                tabBtns.forEach(b => {
                    b.classList.remove('settings-tab-active');
                    b.classList.add('settings-tab-inactive');
                });
                btn.classList.remove('settings-tab-inactive');
                btn.classList.add('settings-tab-active');

                // Update contents
                tabContents.forEach(content => {
                    if (content.id === `tab-content-${targetTab}`) {
                        content.classList.remove('hidden');
                    } else {
                        content.classList.add('hidden');
                    }
                });
            });
        });

        // Toggle API Key Visibility
        toggleApiKeyBtn.addEventListener('click', () => {
            const type = configApiKey.getAttribute('type') === 'password' ? 'text' : 'password';
            configApiKey.setAttribute('type', type);
            // Optional: Toggle icon
        });

        // Handle Model Selection
        configModelSelect.addEventListener('change', () => {
            if (configModelSelect.value === 'custom') {
                configModelCustom.classList.remove('hidden');
                configModelCustom.focus();
            } else {
                configModelCustom.classList.add('hidden');
            }
        });

        // Open Modal
        settingsBtn.addEventListener('click', async () => {
            settingsModal.classList.remove('hidden');
            // Load current config
            try {
                const res = await axios.get('/api/config');
                configApiKey.value = res.data.api_key;
                configBaseUrl.value = res.data.base_url;
                
                const currentModel = res.data.model;
                // Check if model is in select options
                let found = false;
                for(let i=0; i<configModelSelect.options.length; i++) {
                    if(configModelSelect.options[i].value === currentModel) {
                        configModelSelect.value = currentModel;
                        found = true;
                        break;
                    }
                }
                
                if (!found && currentModel) {
                    configModelSelect.value = 'custom';
                    configModelCustom.classList.remove('hidden');
                    configModelCustom.value = currentModel;
                } else {
                    configModelCustom.classList.add('hidden');
                }
                
            } catch (e) {
                console.error("Failed to load config", e);
            }
        });

        // Close Modal
        function closeSettings() {
            settingsModal.classList.add('hidden');
            // Reset API key visibility for security
            configApiKey.setAttribute('type', 'password');
        }
        settingsCancel.addEventListener('click', closeSettings);
        settingsCloseBtn.addEventListener('click', closeSettings);
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) closeSettings();
        });

        // Save Config
        settingsSave.addEventListener('click', async () => {
            let model = configModelSelect.value;
            if (model === 'custom') {
                model = configModelCustom.value.trim();
            }
            
            try {
                await axios.post('/api/config', {
                    api_key: configApiKey.value.trim(),
                    base_url: configBaseUrl.value.trim(),
                    model: model
                });
                alert("设置已保存并生效！");
                closeSettings();
            } catch (e) {
                alert("保存失败: " + e.message);
            }
        });
    </script>
</body>
</html>
